spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pet_app?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never
  jpa:
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQL8Dialect
          show_sql: true
          format_sql: true
          use_sql_comments: true
          hbm2ddl:
            auto: update
          default_batch_fetch_size: 1000
